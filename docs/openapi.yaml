openapi: 3.0.3
info:
  title: Sales Partner Lead Ingestion API
  description: |
    Subset of the Salesforce REST API used for Sales Partner Lead ingestion.
    All paths are relative to the Lumina Solar Salesforce production instance
    (https://luminasolar.my.salesforce.com).
  version: "1.0.0"

servers:
  - url: https://luminasolar.my.salesforce.com
    description: Lumina Solar Salesforce production instance

security:
  - bearerAuth: []

paths:
  /services/data/v60.0/sobjects/Sales_Partner_Lead__c/describe:
    get:
      operationId: describeSalesPartnerLead
      summary: Describe Sales Partner Lead object
      description: Returns metadata for the Sales_Partner_Lead__c object including all fields, types, and constraints.
      tags:
        - Sales Partner Lead
      responses:
        "200":
          description: Sales Partner Lead object metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /services/data/v60.0/sobjects/Sales_Partner_Lead__c:
    post:
      operationId: createSalesPartnerLead
      summary: Create a Sales Partner Lead
      description: Inserts a new Sales_Partner_Lead__c record.
      tags:
        - Sales Partner Lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesPartnerLeadInput"
      responses:
        "201":
          description: Record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /services/data/v60.0/sobjects/Sales_Partner_Lead__c/{ExternalIdField}/{externalIdValue}:
    patch:
      operationId: upsertSalesPartnerLead
      summary: Upsert a Sales Partner Lead by External ID
      description: |
        Inserts or updates a Sales_Partner_Lead__c matched by the given External ID field and value.
        Returns 201 if created, 204 if updated.
      tags:
        - Sales Partner Lead
      parameters:
        - name: ExternalIdField
          in: path
          required: true
          description: API name of the External ID field (e.g., External_ID__c).
          schema:
            type: string
            example: External_ID__c
        - name: externalIdValue
          in: path
          required: true
          description: The external ID value to match.
          schema:
            type: string
            example: LEAD-2026-00142
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesPartnerLeadInput"
      responses:
        "201":
          description: Record created (no match found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"
        "204":
          description: Record updated (existing match found)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Salesforce OAuth 2.0 access token

  schemas:
    SalesPartnerLeadInput:
      type: object
      required:
        - First_Name__c
        - Last_Name__c
        - Email__c
        - Phone__c
        - Street__c
        - City__c
        - State__c
        - Postal_Code__c
        - Lead_Campaign__c
        - UTM_Source__c
        - OwnerId
      properties:
        First_Name__c:
          type: string
          example: Jon
        Last_Name__c:
          type: string
          example: Doe
        Email__c:
          type: string
          format: email
          example: jon.doe@example.com
        Phone__c:
          type: string
          example: "8025551234"
        Street__c:
          type: string
          example: 123 Main St
        City__c:
          type: string
          example: Saxtons River
        State__c:
          type: string
          example: VT
        Postal_Code__c:
          type: string
          example: "05154"
        Lead_Campaign__c:
          type: string
          description: "Required. Name of the partner company sending the lead."
          example: Acme Solar Partners
        UTM_Source__c:
          type: string
          description: "Required. Must be set to 'Partner' for all partner-submitted leads."
          example: Partner
        OwnerId:
          type: string
          description: "Required. 18-character Salesforce User or Queue ID. Retrieve via /chatter/users/me."
          example: "005XXXXXXXXXXXXXXX"
        External_ID__c:
          type: string
          description: External system identifier for upsert matching.
          example: LEAD-2026-00142
        Company__c:
          type: string
          example: Doe Roofing LLC
        Mobile_Phone__c:
          type: string
          example: "8025559876"
        Average_Electric_Bill__c:
          type: number
          description: Monthly electric bill in USD.
          example: 185.00
        Electric_Provider__c:
          type: string
          example: Green Mountain Power
        Appointment_Type__c:
          type: string
        Lead_Type__c:
          type: string
        County__c:
          type: string
        Notes__c:
          type: string
          description: Free-text notes.
        UTM_Medium__c:
          type: string
          description: UTM Medium tracking parameter.
          example: cpc
        UTM_Campaign__c:
          type: string
          description: UTM Campaign tracking parameter.
          example: solar-spring-2026
        UTM_Content__c:
          type: string
          description: UTM Content tracking parameter.
          example: hero-banner
        UTM_Term__c:
          type: string
          description: UTM Term tracking parameter.
          example: solar panels vermont
        Traffic_Source__c:
          type: string
          example: Google Ads
        Landing_Page_URL__c:
          type: string
          example: https://luminasolar.com/get-quote
        gclid__c:
          type: string
          description: Google Click ID for ad attribution.
          example: EAIaIQobChMI...
        fbclid__c:
          type: string
          description: Facebook Click ID for ad attribution.
          example: AbC123dEf456
        Channel__c:
          type: string
          example: Paid Search
      additionalProperties: true

    SaveResult:
      type: object
      properties:
        id:
          type: string
          example: "a0ATV000001abc1EAA"
        success:
          type: boolean
          example: true
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ApiError"

    ApiError:
      type: object
      properties:
        message:
          type: string
        errorCode:
          type: string
        fields:
          type: array
          items:
            type: string

    DescribeResult:
      type: object
      properties:
        name:
          type: string
          example: Sales_Partner_Lead__c
        fields:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              length:
                type: integer
              nillable:
                type: boolean
              createable:
                type: boolean
              updateable:
                type: boolean
              picklistValues:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    active:
                      type: boolean

  responses:
    BadRequest:
      description: Invalid payload — missing required fields, bad picklist value, or invalid field name.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Access token is missing, expired, or invalid.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: The authenticated user lacks permission on the Sales_Partner_Lead__c object.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ApiError"
